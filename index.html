<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Escape the Stone</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="game-panel" aria-label="Escape the Stone game">
        <section id="lobby-screen" class="screen lobby-screen" aria-label="Game lobby">
          <h1>雲朵星星遊戲</h1>
          <button id="start-game" class="start-button" type="button">開始遊戲</button>
          <div class="mascot-stage" aria-hidden="true">
            <div class="lobby-star">
              <span></span>
            </div>
            <div class="lobby-cloud">
              <span></span>
            </div>
          </div>
        </section>

        <section id="loading-screen" class="screen loading-screen" aria-label="Loading game" hidden>
          <div class="loading-badge" aria-hidden="true">
            <div class="tiny-cloud"></div>
          </div>
          <div class="cloud-loader" aria-hidden="true">
            <div class="tiny-cloud loader-cloud"></div>
            <div class="tiny-cloud loader-cloud"></div>
            <div class="tiny-cloud loader-cloud"></div>
          </div>
          <p>Loading <span id="loading-percent">0%</span></p>
        </section>

        <section id="game-menu-screen" class="screen game-menu-screen" aria-label="Game menu" hidden>
          <div class="dream-cloud cloud-one" aria-hidden="true"></div>
          <div class="dream-cloud cloud-two" aria-hidden="true"></div>
          <div class="dream-cloud cloud-three" aria-hidden="true"></div>
          <header class="menu-header">
            <p>Cloud Library</p>
            <h2>選一個遊戲</h2>
          </header>
          <div class="game-grid">
            <button class="game-card is-ready" type="button" data-game="stone">
              <span class="card-icon stone-icon" aria-hidden="true"></span>
              <strong>雲朵星星躲石頭</strong>
              <small>雙人一起躲落石</small>
            </button>
            <button class="game-card" type="button" data-game="space">
              <span class="card-icon rocket-icon" aria-hidden="true"></span>
              <strong>小星星太空冒險</strong>
              <small>準備中</small>
            </button>
            <button class="game-card" type="button" data-game="rainbow">
              <span class="card-icon rainbow-icon" aria-hidden="true"></span>
              <strong>彩虹雲朵跳跳</strong>
              <small>準備中</small>
            </button>
            <button class="game-card" type="button" data-game="moon">
              <span class="card-icon moon-icon" aria-hidden="true"></span>
              <strong>月亮糖果迷宮</strong>
              <small>準備中</small>
            </button>
          </div>
          <p id="menu-message" class="menu-message" role="status" aria-live="polite"></p>
        </section>

        <canvas id="game" class="is-hidden" width="1280" height="720" aria-label="Two player stone dodging game. Star uses S, Z, X, C and A to dash. Cloud uses arrow keys and M to dash."></canvas>
        <div class="hud" aria-hidden="true">
          <div>
            <strong>小星星</strong>
          </div>
          <div>
            <strong>雲朵</strong>
          </div>
        </div>
        <button id="back-menu" class="back-menu is-hidden" type="button">回到選單</button>
        <button id="restart" class="restart" type="button">重新開始</button>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
